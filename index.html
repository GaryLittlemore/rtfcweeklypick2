<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Runcorn Town FC Pick 2 Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0a0f1d;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px 15px;
}

h1{
    margin-bottom:20px;
    text-align:center;
    font-size:32px;
}

.controls{
    width:100%;
    max-width:700px;
    background:#101b33;
    padding:20px;
    border-radius:16px;
    margin-bottom:25px;
    border:2px solid #1e3a70;
}

.control-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    font-size:15px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:18px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#f4b400;
    color:#000;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.canvas-wrapper{
    width:100%;
    max-width:1200px;
    position:relative;
}

#posterCanvas{
    width:100%;
    border-radius:16px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.note{
    margin-top:15px;
    font-size:14px;
    opacity:0.8;
    text-align:center;
}
</style>
</head>

<body>

<h1>Runcorn Town FC Pick 2 Generator</h1>

<div class="controls">

    <div class="control-group">
        <label>Ball Number 1</label>
        <input type="number" id="ball1" value="4">
    </div>

    <div class="control-group">
        <label>Ball Number 2</label>
        <input type="number" id="ball2" value="9">
    </div>

    <div class="control-group">
        <label>Jackpot Value (£)</label>
        <input type="number" id="jackpot" value="500">
    </div>

    <button onclick="downloadImage()">
        Save Image
    </button>

</div>

<div class="canvas-wrapper">
    <canvas id="posterCanvas" width="1250" height="1250"></canvas>
</div>

<div class="note">
    Upload your image as <strong>background.jpg</strong> in the same GitHub folder as this HTML file.
</div>

<script>
const canvas = document.getElementById("posterCanvas");
const ctx = canvas.getContext("2d");

const bg = new Image();
bg.src = "background.jpg";

const ball1Input = document.getElementById("ball1");
const ball2Input = document.getElementById("ball2");
const jackpotInput = document.getElementById("jackpot");

function drawPoster(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(bg,0,0,canvas.width,canvas.height);

    // -----------------------------
    // BALL NUMBERS
    // -----------------------------

    ctx.fillStyle = "#0a1730";
    ctx.font = "bold 140px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // Left Ball
    ctx.fillText(ball1Input.value, 452, 548);

    // Right Ball
    ctx.fillText(ball2Input.value, 792, 548);

    // -----------------------------
    // JACKPOT VALUE
    // -----------------------------

    // Gold gradient similar to image
    const gradient = ctx.createLinearGradient(0,0,0,150);
    gradient.addColorStop(0, "#ffd95f");
    gradient.addColorStop(0.5, "#f4b400");
    gradient.addColorStop(1, "#c78600");

    ctx.fillStyle = gradient;

    ctx.font = "bold 135px Arial";
    ctx.textAlign = "center";

    // Value positioned between £ and +
    ctx.fillText(jackpotInput.value, 920, 880);

    // subtle glow
    ctx.shadowColor = "rgba(255,190,0,0.7)";
    ctx.shadowBlur = 12;

    ctx.fillText(jackpotInput.value, 920, 880);

    ctx.shadowBlur = 0;
}

bg.onload = drawPoster;

ball1Input.addEventListener("input", drawPoster);
ball2Input.addEventListener("input", drawPoster);
jackpotInput.addEventListener("input", drawPoster);

function downloadImage(){

    drawPoster();

    const link = document.createElement("a");
    link.download = "runcorn-town-pick2.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}
</script>

</body>
</html>
