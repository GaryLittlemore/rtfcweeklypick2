<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Runcorn Town FC Pick 2 Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#09101f;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    min-height:100vh;
    padding:25px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin-bottom:20px;
    font-size:34px;
    text-align:center;
}

.controls{
    width:100%;
    max-width:900px;
    background:#101b33;
    border:2px solid #1e3a70;
    border-radius:18px;
    padding:25px;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
}

.control-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-weight:bold;
    font-size:14px;
}

input{
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

button{
    margin-top:25px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#f4b400;
    color:#000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.canvas-wrap{
    width:100%;
    max-width:1200px;
}

canvas{
    width:100%;
    border-radius:18px;
    box-shadow:0 0 30px rgba(0,0,0,0.45);
}

.note{
    margin-top:18px;
    opacity:0.7;
    text-align:center;
    line-height:1.5;
}
</style>
</head>

<body>

<h1>Runcorn Town FC Pick 2 Generator</h1>

<div class="controls">

    <div class="grid">

        <div class="control-group">
            <label>Ball Number 1</label>
            <input type="number" id="ball1" value="4">
        </div>

        <div class="control-group">
            <label>Ball 1 X Position</label>
            <input type="number" id="ball1X" value="450">
        </div>

        <div class="control-group">
            <label>Ball 1 Y Position</label>
            <input type="number" id="ball1Y" value="565">
        </div>

        <div class="control-group">
            <label>Ball Number 2</label>
            <input type="number" id="ball2" value="9">
        </div>

        <div class="control-group">
            <label>Ball 2 X Position</label>
            <input type="number" id="ball2X" value="810">
        </div>

        <div class="control-group">
            <label>Ball 2 Y Position</label>
            <input type="number" id="ball2Y" value="565">
        </div>

        <div class="control-group">
            <label>Jackpot Value (£)</label>
            <input type="text" id="jackpot" value="£50+">
        </div>

        <div class="control-group">
            <label>Jackpot X Position</label>
            <input type="number" id="jackpotX" value="930">
        </div>

        <div class="control-group">
            <label>Jackpot Y Position</label>
            <input type="number" id="jackpotY" value="925">
        </div>

    </div>

    <button onclick="downloadImage()">
        Save Image
    </button>

</div>

<div class="canvas-wrap">
    <canvas id="posterCanvas" width="1250" height="1250"></canvas>
</div>

<div class="note">
    Save your supplied image as <strong>background.jpg</strong><br>
    and place it in the same GitHub folder as this HTML file.
</div>

<script>
const canvas = document.getElementById("posterCanvas");
const ctx = canvas.getContext("2d");

const bg = new Image();
bg.src = "background.jpg";

// Inputs
const inputs = document.querySelectorAll("input");

function drawPoster(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(bg,0,0,canvas.width,canvas.height);

    // =========================
    // GET VALUES
    // =========================

    const ball1 = document.getElementById("ball1").value;
    const ball2 = document.getElementById("ball2").value;
    const jackpot = document.getElementById("jackpot").value;

    const ball1X = parseInt(document.getElementById("ball1X").value);
    const ball1Y = parseInt(document.getElementById("ball1Y").value);

    const ball2X = parseInt(document.getElementById("ball2X").value);
    const ball2Y = parseInt(document.getElementById("ball2Y").value);

    const jackpotX = parseInt(document.getElementById("jackpotX").value);
    const jackpotY = parseInt(document.getElementById("jackpotY").value);

    // =========================
    // BALL NUMBERS
    // =========================

    ctx.fillStyle = "#0b1830";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.font = "bold 140px Arial";

    ctx.fillText(ball1, ball1X, ball1Y);
    ctx.fillText(ball2, ball2X, ball2Y);

    // =========================
    // GOLD JACKPOT TEXT
    // =========================

    const gradient = ctx.createLinearGradient(0,0,0,150);

    gradient.addColorStop(0, "#ffe27a");
    gradient.addColorStop(0.5, "#f4b400");
    gradient.addColorStop(1, "#c78600");

    ctx.fillStyle = gradient;

    ctx.shadowColor = "rgba(255,190,0,0.8)";
    ctx.shadowBlur = 14;

    ctx.font = "bold 150px Arial";

    ctx.fillText(jackpot, jackpotX, jackpotY);

    ctx.shadowBlur = 0;
}

bg.onload = drawPoster;

inputs.forEach(input => {
    input.addEventListener("input", drawPoster);
});

function downloadImage(){

    drawPoster();

    const link = document.createElement("a");

    link.download = "runcorn-town-pick2.png";
    link.href = canvas.toDataURL("image/png");

    link.click();
}
</script>

</body>
</html>
